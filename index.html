        /* ============ GROUPS ============ */
        function showCreateGroup() {
            const allUsers = [];
            onSnapshot(query(collection(db, "users"), where("status", "==", "approved")), snap => {
                snap.forEach(d => { if (d.id !== U.uid) allUsers.push({ id: d.id, ...d.data() }); });
            }, () => {});

            openModal(`
                <div class="modal-hd"><h3>Create Group</h3><button class="btn-icon" onclick="window.closeModal()" style="width:30px;height:30px"><i class="fas fa-xmark"></i></button></div>
                <div class="fg"><label>Group Name</label><input type="text" id="grpName" placeholder="e.g. Math Class 10A"></div>

                    <div id="grpMembersList" style="max-height:200px;overflow-y:auto"></div>

                            <input type="checkbox" style="accent-color:var(--primary)" id="gm_${u.id}">
                            <div class="av av-sm">${hasImg ? `<img src="${u.photoURL}">` : avatarHTML(u)}</div>
                            <span style="font-size:13px;font-weight:500">${u.name || "?"}</span>
                        </div>`;

            $("#btnCreateGrpSubmit").onclick = async () => {
                const name = $("#grpName").value.trim();
                const members = [];
                $$("input[id^='gm_']:checked").forEach(cb => members.push(cb.id.replace("gm_", "")));
                if (!name) { notify(cfgMsg("fillAllFields"), "error"); return; }
                if (members.length === 0) { notify("Select at least one member", "error"); return; }
                try {
                    const grpRef = await getDoc(doc(db, "groups", Date.now().toString()));
                    const groupId = Date.now().toString();
                    await setDoc(doc(db, "groups", groupId), {
                        name, members: [...members, U.uid], createdBy: U.uid, createdByName: UD.name || "Admin",
                        admins: [U.uid], createdAt: serverTimestamp(), photoURL: null
                    });
                    notify(cfgMsg("groupCreated"), "ok");
                    closeModal();
                    loadGroups();

        function loadGroups() {

            groupsUnsub = onSnapshot(query(collection(db, "groups"), where("members", "array-contains", U.uid)), snap => {
                const gl = $("#grpList");
                const gh = $("#grpHead");

                groupsList = [];
                gl.innerHTML = "";
                snap.forEach(d => {
                    const g = d.data();
                    groupsList.push({ id: d.id, ...g });

                        <div class="ct-grp" data-gid="${d.id}">
                            <div class="av-grp"><i class="fas fa-users"></i></div>

                                <div class="me-name">${g.name || "Group"}</div>

                $$(".ct-grp[data-gid]").forEach(c => c.onclick = () => openGroupChat(c.dataset.gid));

        async function openGroupChat(gid) {
            if (groupChatUnsub) { groupChatUnsub(); groupChatUnsub = null; }
            const gd = await getDoc(doc(db, "groups", gid));
            if (!gd.exists()) return;
            const g = gd.data();
            selGroup = { id: gid, ...g };

            const memberNames = [];
            for (const mid of (g.members || []).slice(0, 5)) {
                const md = await getDoc(doc(db, "users", mid));
                if (md.exists()) memberNames.push(md.data().name || "?");

            const memberStr = memberNames.join(", ") + ((g.members || []).length > 5 ? ` +${(g.members || []).length - 5} more` : "");

                const sp = $("#stickerPicker"); const ep = $("#emojiPicker");
                if (ep) ep.classList.remove("open");
                if (sp) { sp.classList.toggle("open"); if (sp.classList.contains("open")) renderStickerPicker("#stickerPicker", gid, true); }

            if (window.innerWidth <= 768) {
                $(".sidebar").classList.add("hidden-mobile");
                $("#chatArea").classList.remove("hidden-mobile");
                $("#btnBack").onclick = () => {
                    $(".sidebar").classList.remove("hidden-mobile");
                    $("#chatArea").classList.add("hidden-mobile");
                    if (groupChatUnsub) { groupChatUnsub(); groupChatUnsub = null; }
                };
            }

            loadGroupMsgs(gid);
        }
        window.openGroupChat = openGroupChat;

        function loadGroupMsgs(gid) {

            groupChatUnsub = onSnapshot(query(collection(db, "groups", gid, "messages"), orderBy("createdAt")), snap => {
                mb.innerHTML = "";
                if (snap.empty) {
                    mb.innerHTML = `<div class="empty" style="padding:40px"><div class="empty-icon"><i class="fas fa-paper-plane"></i></div><h3>Start a conversation</h3><p>Send the first message</p></div>`;
                    return;
                }
                snap.forEach(d => {
                    const m = d.data();
                    const sent = m.senderId === U.uid;
                    const isAdm = UD.role === "admin";
                    const deletedForAll = m.deletedForAll;
                    const deletedFor = m.deletedFor || [];

                    if (deletedFor.includes(U.uid) && !isAdm) return;

                    if (deletedForAll && !isAdm) {
                        const div = document.createElement("div");
                        div.className = `msg ${sent ? "msg-sent" : "msg-recv"} msg-deleted`;
                        div.innerHTML = `<i class="fas fa-ban"></i> ${cfgMsg("deleteForAll")}`;
                        mb.appendChild(div);
                        return;
                    }

                    const senderTag = m.senderRole === "admin" ? `<div class="msg-admin-tag"><i class="fas fa-crown"></i> Admin</div>` : "";
                    const nameTag = !sent ? `<div style="font-size:11px;font-weight:600;color:var(--primary);margin-bottom:2px">${m.senderName || "User"}</div>` : "";
                    const deletedBadge = deletedForAll && isAdm ? `<div class="msg-deleted-badge"><i class="fas fa-eye-slash"></i> Deleted by ${m.deletedByName || "user"}</div>` : "";
                    const msgClass = deletedForAll && isAdm ? " msg-admin-deleted" : "";
                    const img = m.imageUrl ? `<img src="${m.imageUrl}" class="msg-img" onclick="window.open('${m.imageUrl}','_blank')">` : "";

                    const canDelete = UD.role === "admin" || sent;
                    const del = canDelete ? `<button class="msg-del" onclick="event.stopPropagation();showDelGroupMsgOptions('${gid}','${d.id}',${sent},${m.createdAt ? m.createdAt.toMillis() : 0})" title="Delete"><i class="fas fa-trash"></i></button>` : "";
                    const sticker = m.sticker ? `<div class="msg-sticker">${m.sticker}</div>` : "";

                    div.innerHTML = `${deletedBadge}${senderTag}${nameTag}${m.text ? `<div>${m.text}</div>` : ""}${sticker}${img}<div class="msg-time">${fmtTime(m.createdAt)}</div>${del}`;
                    mb.appendChild(div);
                });
                requestAnimationFrame(() => mb.scrollTop = mb.scrollHeight);

                snap.forEach(async d => {

            const isAdmin = UD.role === "admin";
            const now = Date.now();
            const withinTime = createdAtMs && (now - createdAtMs) < MAX_DELETE_MINUTES * 60 * 1000;
            const canDeleteForAll = isAdmin || (isSender && withinTime);

            openModal(`
                <div class="modal-hd"><h3>Delete Message</h3><button class="btn-icon" onclick="window.closeModal()" style="width:30px;height:30px"><i class="fas fa-xmark"></i></button></div>

        async function delGroupMsgForMe(gid, mid) {
            try {
                const msgRef = doc(db, "groups", gid, "messages", mid);
                const msgDoc = await getDoc(msgRef);
                if (!msgDoc.exists()) return;
                const existing = msgDoc.data().deletedFor || [];
                if (!existing.includes(U.uid)) {
                    await updateDoc(msgRef, { deletedFor: [...existing, U.uid] });
                }
                notify(cfgMsg("deleteForMe"), "ok");
            } catch (e) { notify(cfgMsg("deleteFailed"), "error"); }
        }
        window.delGroupMsgForMe = delGroupMsgForMe;

        async function delGroupMsgForAll(gid, mid) {
            try {
                await updateDoc(doc(db, "groups", gid, "messages", mid), {
                    deletedForAll: true, deletedBy: U.uid, deletedByName: UD.name || "Unknown", deletedAt: serverTimestamp()
                });
                notify(cfgMsg("deleteForAll"), "ok");
            } catch (e) { notify(cfgMsg("deleteFailed"), "error"); }
        }

            const t = inp.value.trim();
            if (!t) return;
            inp.value = "";
            try {
                await setDoc(doc(collection(db, "groups", gid, "messages")), {
                    text: t, senderId: U.uid, senderName: UD.name || "User", senderRole: UD.role, createdAt: serverTimestamp(), seenBy: []
                });
            } catch (e) { notify(cfgMsg("sendFailed"), "error"); }
        }

            const file = f.files[0];
            if (!file) return;
            if (file.size > 5 * 1024 * 1024) { notify(cfgMsg("fileTooLarge"), "error"); return; }
            try {

                const base64 = await compressImage(file, 600, 600, 0.7);
                await setDoc(doc(collection(db, "groups", gid, "messages")), {
                    text: "", imageUrl: base64, senderId: U.uid, senderName: UD.name || "User", senderRole: UD.role, createdAt: serverTimestamp(), seenBy: []
                });
                f.value = "";
            } catch (e) { notify(cfgMsg("uploadFailed"), "error"); }

        /* ============ STATUSES ============ */
        function loadStatuses() {
            const sv = $("#stView");
            if (!sv) return;
            const isAdmin = UD?.role === "admin";
            const myGrade = UD?.grade || "";
            const mySection = UD?.section || "";
            const myChatPartners = new Set();
            getDocs(query(collection(db, "chats"), where("participants", "array-contains", U.uid))).then(chSnap => {
                chSnap.forEach(cd => {
                    const ch = cd.data();
                    const other = ch.participants?.find(p => p !== U.uid);
                    if (other) myChatPartners.add(other);
                });
            }).catch(() => {});
            onSnapshot(query(collection(db, "users"), where("status", "==", "approved")), snap => {
                sv.innerHTML = `<div class="st-item" id="addSt"><div class="st-av no">${UD?.statusMedia ? (UD.statusType === "video" ? '<i class="fas fa-play" style="font-size:14px"></i>' : `<img src="${UD.statusMedia}">`) : '<i class="fas fa-plus" style="font-size:14px"></i>'}</div><div class="st-nm">My Status</div></div>`;
                snap.forEach(d => {
                    if (d.id === U.uid) return;
                    const u = d.data();
                    if (!u.statusMedia) return;
                    if (!isAdmin) {
                        const audience = u.visibility?.statusAudience || "both";
                        const isContact = myChatPartners.has(d.id);
                        const isClassmate = u.grade === myGrade && u.section === mySection;
                        if (audience === "contacts" && !isContact) return;
                        if (audience === "classmates" && !isClassmate) return;
                        if (audience === "both" && !isContact && !isClassmate) return;
                    }
                    const thumb = u.statusType === "video" ? '<i class="fas fa-play" style="font-size:14px"></i>' : `<img src="${u.statusMedia}">`;
                    sv.innerHTML += `<div class="st-item" data-viewst="${d.id}"><div class="st-av">${thumb}</div><div class="st-nm">${(u.name || "?").split(" ")[0]}</div></div>`;
                });
                $("#addSt").onclick = showStatusModal;
                $$("[data-viewst]").forEach(s => s.onclick = () => viewStatus(s.dataset.viewst));
            });
        }

        function showStatusModal() {
            const hasMedia = UD?.statusMedia;
            const isVid = UD?.statusType === "video";
            let currentPreview = "";
            if (hasMedia) {
                currentPreview = isVid
                    ? `<video src="${UD.statusMedia}" controls style="max-width:100%;max-height:300px;border-radius:var(--radius-sm)"></video>`
                    : `<img src="${UD.statusMedia}" style="max-width:100%;max-height:300px;border-radius:var(--radius-sm)">`;
            }
            openModal(`
                <div class="modal-hd"><h3>My Status</h3><button class="btn-icon" onclick="window.closeModal()" style="width:30px;height:30px"><i class="fas fa-xmark"></i></button></div>
                ${hasMedia ? `
                <div style="text-align:center;margin-bottom:16px">
                    ${currentPreview}
                    <br><button class="btn btn-d btn-sm" style="margin-top:10px" id="btnDelSt"><i class="fas fa-trash"></i> Delete Status</button>
                </div>` : ""}
                <div class="fg"><label>Upload Image or Video</label><input type="file" id="stIn" accept="image/*,video/*"></div>
                <p style="color:var(--text3);font-size:11px;margin-top:-10px;margin-bottom:12px">Images: max 5MB &bull; Videos: max 20MB</p>
                <button class="btn btn-p" id="btnUpSt"><i class="fas fa-upload"></i> Upload</button>
            `);
            $("#btnUpSt").onclick = async () => {
                const f = $("input#stIn").files[0];
                if (!f) { notify("Select a file", "error"); return; }
                const isVideo = f.type.startsWith("video/");
                const maxSize = isVideo ? 20 * 1024 * 1024 : 5 * 1024 * 1024;
                if (f.size > maxSize) { notify(`File must be under ${isVideo ? "20MB" : "5MB"}`, "error"); return; }
                try {
                    notify("Uploading...", "ok");
                    let mediaUrl;
                    if (isVideo) {
                        mediaUrl = await new Promise((res, rej) => {
                            const reader = new FileReader();
                            reader.onload = () => res(reader.result);
                            reader.onerror = rej;
                            reader.readAsDataURL(f);
                        });
                    } else {
                        mediaUrl = await compressImage(f, 600, 600, 0.7);
                    }
                    await updateDoc(doc(db, "users", U.uid), { statusMedia: mediaUrl, statusType: isVideo ? "video" : "image", statusTimestamp: serverTimestamp() });
                    UD.statusMedia = mediaUrl;
                    UD.statusType = isVideo ? "video" : "image";
                    closeModal();
                    notify("Status updated", "ok");
                    loadStatuses();
                } catch (e) {
                    console.error("Status upload error:", e);
                    notify("Upload failed: " + e.message, "error");
                }
            };
            if ($("#btnDelSt")) {
                $("#btnDelSt").onclick = async () => {
                    await updateDoc(doc(db, "users", U.uid), { statusMedia: null, statusType: null, statusTimestamp: null });
                    UD.statusMedia = null;
                    UD.statusType = null;
                    closeModal();
                    notify("Status deleted", "ok");
                    loadStatuses();
                };
            }
        }

                    <div class="rules-box"><p id="rulesPrev">${rulesText}</p></div>
                </div>`;
            $("#btnSaveRules").onclick = async () => {
                const t = $("#rulesEd").value;
                try {
                    await setDoc(doc(db, "settings", "rules"), { text: t });
                    rulesText = t;
                    $("#rulesPrev").textContent = t;
                    notify("Rules saved", "ok");
                } catch (e) { notify("Failed to save", "error"); }
            };
        }

        /* ---- Settings ---- */
        function loadSettingsTab(c) {
            const themes = ["purple", "blue", "green", "red", "orange", "pink", "cyan", "yellow"];
            c.innerHTML = `
                <div class="ap-header"><h2>Admin Settings</h2></div>
                <div class="sec-card">
                    <h4><i class="fas fa-circle-info"></i> System Info</h4>
                    <div class="detail-grid">
                        <div class="dstat"><label>Admin Email</label><span style="font-size:13px">${ADMIN_EMAIL}</span></div>
                        <div class="dstat"><label>Logged In As</label><span style="font-size:13px">${UD?.email}</span></div>
                    </div>
                </div>
                <div class="sec-card">
                    <h4><i class="fas fa-user-check"></i> Auto-Accept New Users</h4>
                    <p style="color:var(--text2);font-size:13px;margin-bottom:14px">When enabled, new applications are automatically approved and users receive a number instantly.</p>
                    <div class="vis-row"><span>Auto-Accept Applications</span><div class="tog ${window._autoAccept ? "on" : ""}" id="togAutoAccept"></div></div>
                </div>
                <div class="sec-card">
                    <h4><i class="fas fa-key"></i> Change Your Password</h4>
                    <div class="pw-section">
                        <div class="fg"><label style="font-size:12px">Current Password</label><input type="password" id="admCP" placeholder="Current password"></div>
                        <div class="fg"><label style="font-size:12px">New Password</label><input type="password" id="admNP" placeholder="Min 6 characters"></div>
                        <button class="btn btn-w" id="btnAdmPass"><i class="fas fa-key"></i> Update Password</button>
                    </div>
                </div>
                <div class="sec-card">
                    <h4><i class="fas fa-palette"></i> Default Theme (All Users)</h4>
                    <p style="color:var(--text2);font-size:13px;margin-bottom:14px">Sets the default theme for new users and resets all existing users.</p>
                    <div class="tgrid">${themes.map(t => `<div class="topt t-${t}" data-dtheme="${t}"></div>`).join("")}</div>
                </div>`;
            $("#btnAdmPass").onclick = async () => {
                const cp = $("#admCP").value, np = $("#admNP").value;
                if (!cp || !np) { notify(cfgMsg("fillAllFields"), "error"); return; }
                if (np.length < 6) { notify(cfgMsg("passwordTooShort"), "error"); return; }
                try {
                    const cr = EmailAuthProvider.credential(U.email, cp);
                    await reauthenticateWithCredential(auth, cr);
                    await updatePassword(auth, np);
                    notify("Password updated", "ok");
                    $("#admCP").value = "";
                    $("#admNP").value = "";
                } catch (e) { notify("Wrong current password", "error"); }
            };
            $$("[data-dtheme]").forEach(el => {
                el.onclick = async () => {
                    if (!confirm(`Set "${el.dataset.dtheme}" as default theme for ALL users?`)) return;
                    const snap = await getDocs(query(collection(db, "users"), where("status", "==", "approved")));
                    const jobs = [];
                    snap.forEach(d => jobs.push(updateDoc(doc(db, "users", d.id), { theme: el.dataset.dtheme })));
                    await Promise.all(jobs);
                    applyTheme(el.dataset.dtheme);
                    notify("Default theme updated for all users", "ok");
                };
            });
            const togAE = $("#togAutoAccept");
            if (togAE) togAE.onclick = async () => {
                togAE.classList.toggle("on");
                window._autoAccept = togAE.classList.contains("on");
                try {
                    await setDoc(doc(db, "settings", "autoAccept"), { enabled: window._autoAccept });
                    notify(`Auto-Accept ${window._autoAccept ? "enabled" : "disabled"}`, "ok");
                } catch (e) { notify("Failed to save setting", "error"); }
            };
        }

        /* ============ ADMIN ACTIONS ============ */
        window.admApprove = async (id) => {
            const ud = await getDoc(doc(db, "users", id));
            const userData = ud.data();
            const prefNum = userData.application?.preferredNumber;
            let num = prefNum || (1000 + Math.floor(Math.random() * 9000));
            if (!prefNum) {
                let existing = await getDocs(query(collection(db, "users"), where("number", "==", num)));
                while (!existing.empty) { num = 1000 + Math.floor(Math.random() * 9000); existing = await getDocs(query(collection(db, "users"), where("number", "==", num))); }
            }
            await updateDoc(doc(db, "users", id), { status: "approved", number: num, grade: userData.application?.grade || null, section: userData.application?.section || null });
            notify(`Approved with #${num}`, "ok");
            loadTab("apps");
        };

        window.admDeny = async (id) => {
            if (!confirm("Deny this application?")) return;
            await updateDoc(doc(db, "users", id), { status: "denied" });
            notify("Application denied", "error");
            loadTab("apps");
        };

        window.admViewUser = async (id) => {
            const ud = await getDoc(doc(db, "users", id));
            if (!ud.exists()) return;
            const u = ud.data();
            const hasImg = u.photoURL && u.visibility?.showImage !== false;
            openModal(`
                <div class="modal-hd"><h3>User Details</h3><button class="btn-icon" onclick="window.closeModal()" style="width:30px;height:30px"><i class="fas fa-xmark"></i></button></div>
                <div style="display:flex;align-items:center;gap:14px;margin-bottom:18px">
                    <div class="av av-lg">${hasImg ? `<img src="${u.photoURL}">` : avatarHTML(u)}</div>
                    <div><h3 style="font-size:18px">${u.name} ${adminBadge(u)}</h3><p style="color:var(--text2);font-size:13px">${u.email}</p></div>
                </div>
                <div class="detail-grid">
                    <div class="dstat"><label>Number</label><span>#${u.number || "N/A"}</span></div>
                    <div class="dstat"><label>Class</label><span>${u.grade || "N/A"} ${u.section || ""}</span></div>
                    <div class="dstat"><label>Online</label><span class="sb ${u.online ? "sb-on" : "sb-of"}">${u.online ? "Online" : "Offline"}</span></div>
                    <div class="dstat"><label>Warnings</label><span>${u.warnings?.length || 0}</span></div>
                    <div class="dstat"><label>Last Seen</label><span style="font-size:12px">${u.lastSeen ? fmtLast(u.lastSeen) : "N/A"}</span></div>
                </div>
                ${u.bio ? `<div style="margin-bottom:14px"><label style="color:var(--text3);font-size:11px;text-transform:uppercase;font-weight:600">Bio</label><p style="font-size:13px;margin-top:4px">${u.bio}</p></div>` : ""}
                ${u.warnings?.length ? `<div style="margin-bottom:14px"><label style="color:var(--text3);font-size:11px;text-transform:uppercase;font-weight:600">Warnings</label><div style="margin-top:6px">${u.warnings.map(w => `<div class="warn-badge"><i class="fas fa-triangle-exclamation"></i> ${w}</div>`).join(" ")}</div></div>` : ""}
                <div class="ab" style="justify-content:flex-end">
                    <button class="btn btn-o btn-sm" onclick="window.closeModal();admChgNum('${id}','${u.number||""}')"><i class="fas fa-hashtag"></i> Change Number</button>
                    <button class="btn btn-o btn-sm" onclick="window.closeModal();admChgClass('${id}','${u.grade||""}','${u.section||""}')"><i class="fas fa-school"></i> Change Class</button>
                    <button class="btn btn-w btn-sm" onclick="admWarn('${id}');window.closeModal()"><i class="fas fa-triangle-exclamation"></i> Warn</button>
                    ${u.banned
                        ? `<button class="btn btn-ok btn-sm" onclick="admUnban('${id}');window.closeModal()"><i class="fas fa-unlock"></i> Unban</button>`
                        : `<button class="btn btn-d btn-sm" onclick="admBan('${id}');window.closeModal()"><i class="fas fa-ban"></i> Ban</button>`
                    }
                    <button class="btn btn-d btn-sm" onclick="window.closeModal();admDeleteUser('${id}','${u.name || "?"}')"><i class="fas fa-trash"></i> Delete</button>
                </div>
            `);
        };

        window.admChgPass = (id, email) => {
            openModal(`
                <div class="modal-hd"><h3>Change User Password</h3><button class="btn-icon" onclick="window.closeModal()" style="width:30px;height:30px"><i class="fas fa-xmark"></i></button></div>
                <p style="color:var(--text2);font-size:13px;margin-bottom:16px">Setting new password for <b>${email}</b></p>
                <div class="fg"><label>New Password</label><input type="password" id="admUsrNP" placeholder="Min 6 characters"></div>
                <button class="btn btn-p" id="btnSetPass"><i class="fas fa-key"></i> Set Password</button>
            `);
            $("#btnSetPass").onclick = async () => {
                const np = $("#admUsrNP").value;
                if (!np || np.length < 6) { notify(cfgMsg("passwordTooShort"), "error"); return; }
                await updateDoc(doc(db, "users", id), { tempPassword: np });
                notify("Password stored. User will use this on next login.", "ok");
                closeModal();
            };
        };

        window.admChgNum = (id, currentNum) => {
            openModal(`
                <div class="modal-hd"><h3>Change User Number</h3><button class="btn-icon" onclick="window.closeModal()" style="width:30px;height:30px"><i class="fas fa-xmark"></i></button></div>
                <p style="color:var(--text2);font-size:13px;margin-bottom:16px">Current number: <b>#${currentNum || "None"}</b></p>
                <div class="fg"><label>New Number</label><input type="number" id="admNewNum" placeholder="Enter new number"></div>
                <button class="btn btn-p" id="btnSetNum"><i class="fas fa-hashtag"></i> Set Number</button>
            `);
            $("#btnSetNum").onclick = async () => {
                const n = parseInt($("#admNewNum").value);
                if (!n || n < 1) { notify(cfgMsg("invalidNumber"), "error"); return; }
                const existing = await getDocs(query(collection(db, "users"), where("number", "==", n)));
                if (!existing.empty) { notify(cfgMsg("numberTaken"), "error"); return; }
                await updateDoc(doc(db, "users", id), { number: n });
                notify(`Number changed to #${n}`, "ok");
                closeModal();
                if (currentTab === "users") loadTab("users");
            };
        };

        window.admChgClass = (id, currentGrade, currentSection) => {
            openModal(`
                <div class="modal-hd"><h3>Change Class / Section</h3><button class="btn-icon" onclick="window.closeModal()" style="width:30px;height:30px"><i class="fas fa-xmark"></i></button></div>
                <p style="color:var(--text2);font-size:13px;margin-bottom:16px">Current: <b>${currentGrade || "None"} ${currentSection || ""}</b></p>
                <div class="fg"><label>Grade / Class</label><input type="text" id="admNewGrade" value="${currentGrade || ""}" placeholder="e.g. 10th Grade"></div>
                <div class="fg"><label>Section</label><input type="text" id="admNewSection" value="${currentSection || ""}" placeholder="e.g. A"></div>
                <button class="btn btn-p" id="btnSetClass"><i class="fas fa-school"></i> Update Class</button>
            `);
            $("#btnSetClass").onclick = async () => {
                const grade = $("#admNewGrade").value.trim();
                const section = $("#admNewSection").value.trim();
                if (!grade || !section) { notify(cfgMsg("fillAllFields"), "error"); return; }
                await updateDoc(doc(db, "users", id), { grade, section });
                notify("Class updated", "ok");
                closeModal();
                if (currentTab === "users") loadTab("users");
            };
        };

        window.admWarn = async (id) => {
            const r = prompt("Enter warning reason:");
            if (!r || !r.trim()) return;
            const ud = await getDoc(doc(db, "users", id));
            const w = ud.data().warnings || [];
            w.push(r.trim());
            await updateDoc(doc(db, "users", id), { warnings: w });
            notify("User warned", "w");
            if (currentTab === "users") loadTab("users");
        };

        window.admBan = async (id) => {
            if (!confirm("Ban this user? They won't be able to login.")) return;
            await updateDoc(doc(db, "users", id), { banned: true });
            notify("User banned", "error");
            if (currentTab === "users") loadTab("users");
        };

        window.admUnban = async (id) => {
            if (!confirm("Unban this user?")) return;
            await updateDoc(doc(db, "users", id), { banned: false });
            notify("User unbanned", "ok");
            if (currentTab === "users") loadTab("users");
        };

        window.admViewChat = (cid) => {
            openModal(`
                <div class="modal-hd"><h3>Chat Messages</h3><button class="btn-icon" onclick="window.closeModal()" style="width:30px;height:30px"><i class="fas fa-xmark"></i></button></div>
                <div style="display:flex;flex-direction:column;height:450px">
                    <div id="admMsgs" style="flex:1;overflow-y:auto;padding:14px;background:var(--bg);border-radius:var(--radius-sm);margin-bottom:12px"></div>
                    <div style="display:flex;gap:8px">
                        <input type="text" id="admMsgIn" placeholder="Message as admin..." style="flex:1;padding:11px 16px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--bg2);color:var(--text);font-size:13px;outline:none">
                        <button class="send-btn" id="btnAdmSend" style="width:42px;height:42px"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            `);

            onSnapshot(query(collection(db, "chats", cid, "messages"), orderBy("createdAt")), snap => {
                const mb = $("#admMsgs");
                if (!mb) return;
                mb.innerHTML = "";
                if (snap.empty) { mb.innerHTML = '<p style="text-align:center;color:var(--text3);padding:40px">No messages</p>'; return; }
                snap.forEach(d => {
                    const m = d.data();
                    const sent = m.senderId === U.uid;
                    const deletedBadge = m.deletedForAll ? `<div class="msg-deleted-badge"><i class="fas fa-eye-slash"></i> Deleted by ${m.deletedByName || "user"}</div>` : "";
                    const msgClass = m.deletedForAll ? " msg-admin-deleted" : "";
                    const tag = m.senderRole === "admin" ? `<div class="msg-admin-tag"><i class="fas fa-crown"></i> Admin</div>` : "";
                    const sticker = m.sticker ? `<div class="msg-sticker">${m.sticker}</div>` : "";
                    const img = m.imageUrl ? `<img src="${m.imageUrl}" class="msg-img">` : "";
                    let voice = "";
                    if (m.audioUrl) {
                        const dur = m.duration || 0;
                        const durStr = `${Math.floor(dur/60)}:${String(dur%60).padStart(2,'0')}`;
                        voice = `<div class="msg-voice">
                            <button class="voice-play" onclick="event.stopPropagation();window._playVoice(this,'${m.audioUrl}')"><i class="fas fa-play"></i></button>
                            <div class="voice-bar"><div class="voice-progress"></div></div>
                            <span class="voice-dur">${durStr}</span>
                        </div>`;
                    }
                    const div = document.createElement("div");
                    div.className = `msg ${sent ? "msg-sent" : "msg-recv"}${msgClass}`;
                    div.innerHTML = `${deletedBadge}${tag}${m.text ? `<div>${m.text}</div>` : ""}${sticker}${img}${voice}<div class="msg-time">${fmtTime(m.createdAt)}</div><button class="msg-del" onclick="delMsg('${cid}','${d.id}')"><i class="fas fa-trash"></i></button>`;
                    mb.appendChild(div);
                });
                mb.scrollTop = mb.scrollHeight;
            });

            $("#btnAdmSend").onclick = async () => {
                const inp = $("#admMsgIn");
                const t = inp.value.trim();
                if (!t) return;
                await setDoc(doc(collection(db, "chats", cid, "messages")), {
                    text: `[Admin] ${t}`, senderId: U.uid, senderRole: "admin", createdAt: serverTimestamp(), seenBy: []
                });
                inp.value = "";
            };
            $("#admMsgIn").onkeypress = e => { if (e.key === "Enter") $("#btnAdmSend").click(); };
        };

        window.admUnblock = async (id) => {
            if (!confirm("Unblock this chat?")) return;
            await updateDoc(doc(db, "chats", id), { blocked: false, blockedBy: null, blockedAt: null });
            notify("Chat unblocked", "ok");
            loadTab("blocked");
        };

        window.admDeleteUser = async (id, name) => {
            if (!confirm(`Delete user "${name}"? This removes all their data permanently.`)) return;
            try {
                // Delete all chats where this user is participant
                const chatsSnap = await getDocs(collection(db, "chats"));
                for (const d of chatsSnap.docs) {
                    const ch = d.data();
                    if (ch.participants?.includes(id)) {
                        const msgsSnap = await getDocs(collection(db, "chats", d.id, "messages"));
                        for (const m of msgsSnap.docs) { await deleteDoc(doc(db, "chats", d.id, "messages", m.id)); }
                        await deleteDoc(doc(db, "chats", d.id));
                    }
                }
                // Delete the user document
                await deleteDoc(doc(db, "users", id));
                notify(`User "${name}" deleted`, "ok");
                loadTab("users");
            } catch (e) { notify("Failed to delete user: " + e.message, "error"); }
        };

        /* ============ VOICE PLAYBACK ============ */
        let currentAudio = null;
        window._playVoice = (btn, audioUrl) => {
            if (currentAudio) { currentAudio.pause(); currentAudio = null; }
            const audio = new Audio(audioUrl);
            currentAudio = audio;
            const progress = btn.closest(".msg-voice").querySelector(".voice-progress");
            const playIcon = btn.querySelector("i");
            playIcon.className = "fas fa-pause";
            audio.play();
            audio.ontimeupdate = () => {
                if (audio.duration) progress.style.width = (audio.currentTime / audio.duration * 100) + "%";
            };
            audio.onended = () => {
                playIcon.className = "fas fa-play";
                progress.style.width = "0%";
                currentAudio = null;
            };
            btn.onclick = (e) => {
                e.stopPropagation();
                if (audio.paused) { audio.play(); playIcon.className = "fas fa-pause"; }
                else { audio.pause(); playIcon.className = "fas fa-play"; }
            };
        };

        /* ============ INIT ============ */
        render();
    </script>
</body>
</html>
