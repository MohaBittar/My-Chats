                    <img src="${u.statusImage}" style="max-width:100%;max-height:400px;border-radius:var(--radius-sm)">
                    <p style="color:var(--text2);margin-top:10px;font-size:12px">${u.statusTimestamp ? "Posted " + fmtLast(u.statusTimestamp) : ""}</p>
                </div>
            `);
        }

        /* ============ ADMIN PANEL ============ */
        function showAdmin() {
            if (UD?.role !== "admin") return;
            $("#admPanel").classList.add("active");
            loadTab(currentTab);
        }

        async function loadTab(tab) {
            const c = $("#admCt");
            if (!c) return;
            c.innerHTML = '<div class="spinner"></div>';
            try {
                if (tab === "apps") await loadApps(c);
                else if (tab === "users") await loadUsersTab(c);
                else if (tab === "chats") await loadChatsTab(c);
                else if (tab === "blocked") await loadBlockedTab(c);
                else if (tab === "rules") loadRulesTab(c);
                else if (tab === "settings") loadSettingsTab(c);
            } catch (e) {
                c.innerHTML = `<div class="empty-admin"><i class="fas fa-exclamation-triangle"></i><p>Failed to load data</p></div>`;
            }
        }

        /* ---- Applications ---- */
        async function loadApps(c) {
            const snap = await getDocs(query(collection(db, "users"), where("status", "==", "pending")));
            let count = 0;
            let totalUsers = 0;
            try { const s = await getDocs(query(collection(db, "users"), where("status", "==", "approved"))); totalUsers = s.size; } catch (e) { }
            count = snap.size;

            let h = `
                <div class="stat-grid">
                    <div class="stat-card"><div class="stat-icon" style="background:var(--warn-bg);color:var(--warn)"><i class="fas fa-clock"></i></div><div class="stat-val">${count}</div><div class="stat-lbl">Pending Applications</div></div>
                    <div class="stat-card"><div class="stat-icon" style="background:var(--ok-bg);color:var(--ok)"><i class="fas fa-users"></i></div><div class="stat-val">${totalUsers}</div><div class="stat-lbl">Approved Users</div></div>
                </div>
                <div class="ap-header"><h2>Pending Applications</h2></div>`;

            if (snap.empty) {
                h += `<div class="empty-admin"><i class="fas fa-inbox"></i><p>No pending applications</p></div>`;
            } else {
                h += '<div class="tbl-wrap"><table class="tbl"><thead><tr><th>User</th><th>Email</th><th>Application Info</th><th>Actions</th></tr></thead><tbody>';
                snap.forEach(d => {
                    const u = d.data(), a = u.application || {};
                    h += `<tr>
                        <td style="font-weight:600">${u.name || "?"}</td>
                        <td style="color:var(--text2)">${u.email || "?"}</td>
                        <td style="font-size:12px;line-height:1.6"><b>Phone:</b> ${a.phone || "N/A"}<br><b>Grade:</b> ${a.grade || "N/A"}<br><b>Why:</b> ${a.reason || "N/A"}</td>
                        <td><div class="ab"><button class="ai ai-ok" onclick="admApprove('${d.id}')" title="Approve"><i class="fas fa-check"></i></button><button class="ai ai-no" onclick="admDeny('${d.id}')" title="Deny"><i class="fas fa-xmark"></i></button></div></td>
                    </tr>`;
                });
                h += '</tbody></table></div>';
            }
            c.innerHTML = h;
        }

        /* ---- Users ---- */
        async function loadUsersTab(c) {
            const snap = await getDocs(query(collection(db, "users"), where("status", "==", "approved")));
            let onlineCount = 0;
            let bannedCount = 0;
            let warnCount = 0;
            const users = [];
            snap.forEach(d => {
                const u = d.data();
                if (u.online) onlineCount++;
                if (u.banned) bannedCount;
                if (u.warnings?.length) warnCount += u.warnings.length;
                users.push({ id: d.id, ...u });
            });

            let h = `
                <div class="stat-grid">
                    <div class="stat-card"><div class="stat-icon" style="background:var(--ok-bg);color:var(--ok)"><i class="fas fa-users"></i></div><div class="stat-val">${users.length}</div><div class="stat-lbl">Total Users</div></div>
                    <div class="stat-card"><div class="stat-icon" style="background:var(--primary-light);color:var(--primary)"><i class="fas fa-circle"></i></div><div class="stat-val">${onlineCount}</div><div class="stat-lbl">Online Now</div></div>
                    <div class="stat-card"><div class="stat-icon" style="background:var(--warn-bg);color:var(--warn)"><i class="fas fa-triangle-exclamation"></i></div><div class="stat-val">${warnCount}</div><div class="stat-lbl">Total Warnings</div></div>
                </div>
                <div class="ap-header"><h2>All Users</h2></div>
                <div class="tbl-wrap"><table class="tbl"><thead><tr><th>User</th><th>Number</th><th>Online</th><th>Warnings</th><th>Last Seen</th><th>Actions</th></tr></thead><tbody>`;

            users.forEach(u => {
                h += `<tr>
                    <td style="font-weight:600">${u.name || "?"} ${u.banned ? '<span class="sb sb-d">BANNED</span>' : ""}</td>
                    <td>#${u.number || "?"}</td>
                    <td><span class="sb ${u.online ? "sb-on" : "sb-of"}">${u.online ? "Online" : "Offline"}</span></td>
                    <td>${u.warnings?.length || 0}</td>
                    <td style="font-size:12px">${u.lastSeen ? fmtLast(u.lastSeen) : "?"}</td>
                    <td><div class="ab">
                        <button class="ai ai-v" onclick="admViewUser('${u.id}')" title="View"><i class="fas fa-eye"></i></button>
                        <button class="ai ai-e" onclick="admChgPass('${u.id}','${u.email}')" title="Change Password"><i class="fas fa-key"></i></button>
                        <button class="ai ai-w" onclick="admWarn('${u.id}')" title="Warn"><i class="fas fa-triangle-exclamation"></i></button>
                        <button class="ai ai-b" onclick="admBan('${u.id}')" title="Ban"><i class="fas fa-ban"></i></button>
                    </div></td>
                </tr>`;
            });
            h += '</tbody></table></div>';
            c.innerHTML = h;
        }

        /* ---- All Chats ---- */
        async function loadChatsTab(c) {
            const snap = await getDocs(collection(db, "chats"));
            let h = `<div class="ap-header"><h2>All Chats</h2></div>`;
            if (snap.empty) {
                h += `<div class="empty-admin"><i class="fas fa-comments"></i><p>No chats yet</p></div>`;
            } else {
                h += '<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Participants</th><th>Messages</th><th>Status</th><th>Action</th></tr></thead><tbody>';
                for (const d of snap.docs) {
                    const ch = d.data();
                    const ms = await getDocs(collection(db, "chats", d.id, "messages"));
                    const nm = [];
                    for (const p of ch.participants || []) {
                        const ud = await getDoc(doc(db, "users", p));
                        if (ud.exists()) nm.push(ud.data().name);
                    }
                    h += `<tr>
                        <td style="font-weight:600">${nm.join(" & ")}</td>
                        <td>${ms.size}</td>
                        <td>${ch.blocked ? '<span class="sb sb-d"><i class="fas fa-ban"></i> Blocked</span>' : '<span class="sb sb-a"><i class="fas fa-check"></i> Active</span>'}</td>
                        <td><button class="ai ai-v" onclick="admViewChat('${d.id}')" title="View"><i class="fas fa-eye"></i></button></td>
                    </tr>`;
                }
                h += '</tbody></table></div>';
            }
            c.innerHTML = h;
        }

        /* ---- Blocked Chats ---- */
        async function loadBlockedTab(c) {
            const snap = await getDocs(query(collection(db, "chats"), where("blocked", "==", true)));
            let h = `<div class="ap-header"><h2>Blocked Chats</h2></div>`;
            if (snap.empty) {
                h += `<div class="empty-admin"><i class="fas fa-ban"></i><p>No blocked chats</p></div>`;
            } else {
                h += '<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Chat</th><th>Blocked By</th><th>Actions</th></tr></thead><tbody>';
                for (const d of snap.docs) {
                    const ch = d.data();
                    const bd = await getDoc(doc(db, "users", ch.blockedBy));
                    const nm = [];
                    for (const p of ch.participants || []) {
                        const ud = await getDoc(doc(db, "users", p));
                        if (ud.exists()) nm.push(ud.data().name);
                    }
                    h += `<tr>
                        <td style="font-weight:600">${nm.join(" & ")}</td>
                        <td style="color:var(--text2)">${bd.exists() ? bd.data().name : "Unknown"}</td>
                        <td><div class="ab">
                            <button class="ai ai-v" onclick="admViewChat('${d.id}')" title="View"><i class="fas fa-eye"></i></button>
                            <button class="ai ai-ok" onclick="admUnblock('${d.id}')" title="Unblock"><i class="fas fa-unlock"></i></button>
                        </div></td>
                    </tr>`;
                }
                h += '</tbody></table></div>';
            }
            c.innerHTML = h;
        }

        /* ---- Rules ---- */
        function loadRulesTab(c) {
            c.innerHTML = `
                <div class="ap-header"><h2>App Rules</h2></div>
                <div class="sec-card">
                    <h4><i class="fas fa-gavel"></i> Edit Rules</h4>
                    <p style="color:var(--text2);font-size:13px;margin-bottom:14px">These rules are visible to all users when they open the app.</p>
                    <div class="fg"><textarea id="rulesEd" style="min-height:220px">${rulesText}</textarea></div>
                    <button class="btn btn-p" id="btnSaveRules"><i class="fas fa-floppy-disk"></i> Save Rules</button>
                </div>
                <div class="sec-card">
                    <h4><i class="fas fa-eye"></i> User Preview</h4>
                    <div class="rules-box"><p id="rulesPrev">${rulesText}</p></div>
                </div>`;
            $("#btnSaveRules").onclick = async () => {
                const t = $("#rulesEd").value;
                try {
                    await setDoc(doc(db, "settings", "rules"), { text: t });
                    rulesText = t;
                    $("#rulesPrev").textContent = t;
                    notify("Rules saved", "ok");
                } catch (e) { notify("Failed to save", "error"); }
            };
        }

        /* ---- Settings ---- */
        function loadSettingsTab(c) {
            const themes = ["purple", "blue", "green", "red", "orange", "pink", "cyan", "yellow"];
            c.innerHTML = `
                <div class="ap-header"><h2>Admin Settings</h2></div>
                <div class="sec-card">
                    <h4><i class="fas fa-circle-info"></i> System Info</h4>
                    <div class="detail-grid">
                        <div class="dstat"><label>Admin Email</label><span style="font-size:13px">${ADMIN_EMAIL}</span></div>
                        <div class="dstat"><label>Logged In As</label><span style="font-size:13px">${UD?.email}</span></div>
                    </div>
                </div>
                <div class="sec-card">
                    <h4><i class="fas fa-key"></i> Change Your Password</h4>
                    <div class="pw-section">
                        <div class="fg"><label style="font-size:12px">Current Password</label><input type="password" id="admCP" placeholder="Current password"></div>
                        <div class="fg"><label style="font-size:12px">New Password</label><input type="password" id="admNP" placeholder="Min 6 characters"></div>
                        <button class="btn btn-w" id="btnAdmPass"><i class="fas fa-key"></i> Update Password</button>
                    </div>
                </div>
                <div class="sec-card">
                    <h4><i class="fas fa-palette"></i> Default Theme (All Users)</h4>
                    <p style="color:var(--text2);font-size:13px;margin-bottom:14px">Sets the default theme for new users and resets all existing users.</p>
                    <div class="tgrid">${themes.map(t => `<div class="topt t-${t}" data-dtheme="${t}"></div>`).join("")}</div>
                </div>`;
            $("#btnAdmPass").onclick = async () => {
                const cp = $("#admCP").value, np = $("#admNP").value;
                if (!cp || !np) { notify("Fill both fields", "error"); return; }
                if (np.length < 6) { notify("Min 6 characters", "error"); return; }
                try {
                    const cr = EmailAuthProvider.credential(U.email, cp);
                    await reauthenticateWithCredential(auth, cr);
                    await updatePassword(auth, np);
                    notify("Password updated", "ok");
                    $("#admCP").value = "";
                    $("#admNP").value = "";
                } catch (e) { notify("Wrong current password", "error"); }
            };
            $$("[data-dtheme]").forEach(el => {
                el.onclick = async () => {
                    if (!confirm(`Set "${el.dataset.dtheme}" as default theme for ALL users?`)) return;
                    const snap = await getDocs(query(collection(db, "users"), where("status", "==", "approved")));
                    const jobs = [];
                    snap.forEach(d => jobs.push(updateDoc(doc(db, "users", d.id), { theme: el.dataset.dtheme })));
                    await Promise.all(jobs);
                    applyTheme(el.dataset.dtheme);
                    notify("Default theme updated for all users", "ok");
                };
            });
        }

        /* ============ ADMIN ACTIONS ============ */
        window.admApprove = async (id) => {
            const num = 1000 + Math.floor(Math.random() * 9000);
            await updateDoc(doc(db, "users", id), { status: "approved", number: num });
            notify(`Approved with #${num}`, "ok");
            loadTab("apps");
        };

        window.admDeny = async (id) => {
            if (!confirm("Deny this application?")) return;
            await updateDoc(doc(db, "users", id), { status: "denied" });
            notify("Application denied", "error");
            loadTab("apps");
        };

        window.admViewUser = async (id) => {
            const ud = await getDoc(doc(db, "users", id));
            if (!ud.exists()) return;
            const u = ud.data();
            const hasImg = u.photoURL && u.visibility?.showImage !== false;
            openModal(`
                <div class="modal-hd"><h3>User Details</h3><button class="btn-icon" onclick="closeModal()" style="width:30px;height:30px"><i class="fas fa-xmark"></i></button></div>
                <div style="display:flex;align-items:center;gap:14px;margin-bottom:18px">
                    <div class="av av-lg">${hasImg ? `<img src="${u.photoURL}">` : avatarHTML(u)}</div>
                    <div><h3 style="font-size:18px">${u.name} ${adminBadge(u)}</h3><p style="color:var(--text2);font-size:13px">${u.email}</p></div>
                </div>
                <div class="detail-grid">
                    <div class="dstat"><label>Number</label><span>#${u.number || "N/A"}</span></div>
                    <div class="dstat"><label>Online</label><span class="sb ${u.online ? "sb-on" : "sb-of"}">${u.online ? "Online" : "Offline"}</span></div>
                    <div class="dstat"><label>Warnings</label><span>${u.warnings?.length || 0}</span></div>
                    <div class="dstat"><label>Last Seen</label><span style="font-size:12px">${u.lastSeen ? fmtLast(u.lastSeen) : "N/A"}</span></div>
                </div>
                ${u.bio ? `<div style="margin-bottom:14px"><label style="color:var(--text3);font-size:11px;text-transform:uppercase;font-weight:600">Bio</label><p style="font-size:13px;margin-top:4px">${u.bio}</p></div>` : ""}
                ${u.warnings?.length ? `<div style="margin-bottom:14px"><label style="color:var(--text3);font-size:11px;text-transform:uppercase;font-weight:600">Warnings</label><div style="margin-top:6px">${u.warnings.map(w => `<div class="warn-badge"><i class="fas fa-triangle-exclamation"></i> ${w}</div>`).join(" ")}</div></div>` : ""}
                <div class="ab" style="justify-content:flex-end">
                    <button class="btn btn-w btn-sm" onclick="admWarn('${id}');closeModal()"><i class="fas fa-triangle-exclamation"></i> Warn</button>
                    <button class="btn btn-d btn-sm" onclick="admBan('${id}');closeModal()"><i class="fas fa-ban"></i> Ban</button>
                </div>
            `);
        };

        window.admChgPass = (id, email) => {
            openModal(`
                <div class="modal-hd"><h3>Change User Password</h3><button class="btn-icon" onclick="closeModal()" style="width:30px;height:30px"><i class="fas fa-xmark"></i></button></div>
                <p style="color:var(--text2);font-size:13px;margin-bottom:16px">Setting new password for <b>${email}</b></p>
                <div class="fg"><label>New Password</label><input type="password" id="admUsrNP" placeholder="Min 6 characters"></div>
                <button class="btn btn-p" id="btnSetPass"><i class="fas fa-key"></i> Set Password</button>
            `);
            $("#btnSetPass").onclick = async () => {
                const np = $("#admUsrNP").value;
                if (!np || np.length < 6) { notify("Min 6 characters", "error"); return; }
                await updateDoc(doc(db, "users", id), { tempPassword: np });
                notify("Password stored. User will use this on next login.", "ok");
                closeModal();
            };
        };

        window.admWarn = async (id) => {
            const r = prompt("Enter warning reason:");
            if (!r || !r.trim()) return;
            const ud = await getDoc(doc(db, "users", id));
            const w = ud.data().warnings || [];
            w.push(r.trim());
            await updateDoc(doc(db, "users", id), { warnings: w });
            notify("User warned", "w");
            if (currentTab === "users") loadTab("users");
        };

        window.admBan = async (id) => {
            if (!confirm("Ban this user? They won't be able to login.")) return;
            await updateDoc(doc(db, "users", id), { banned: true });
            notify("User banned", "error");
            if (currentTab === "users") loadTab("users");
        };

        window.admViewChat = (cid) => {
            openModal(`
                <div class="modal-hd"><h3>Chat Messages</h3><button class="btn-icon" onclick="closeModal()" style="width:30px;height:30px"><i class="fas fa-xmark"></i></button></div>
                <div style="display:flex;flex-direction:column;height:450px">
                    <div id="admMsgs" style="flex:1;overflow-y:auto;padding:14px;background:var(--bg);border-radius:var(--radius-sm);margin-bottom:12px"></div>
                    <div style="display:flex;gap:8px">
                        <input type="text" id="admMsgIn" placeholder="Message as admin..." style="flex:1;padding:11px 16px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--bg2);color:var(--text);font-size:13px;outline:none">
                        <button class="send-btn" id="btnAdmSend" style="width:42px;height:42px"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            `);

            onSnapshot(query(collection(db, "chats", cid, "messages"), orderBy("createdAt")), snap => {
                const mb = $("#admMsgs");
                if (!mb) return;
                mb.innerHTML = "";
                if (snap.empty) { mb.innerHTML = '<p style="text-align:center;color:var(--text3);padding:40px">No messages</p>'; return; }
                snap.forEach(d => {
                    const m = d.data();
                    const sent = m.senderId === U.uid;
                    const div = document.createElement("div");
                    div.className = `msg ${sent ? "msg-sent" : "msg-recv"}`;
                    div.innerHTML = `${m.text ? `<div>${m.text}</div>` : ""}${m.imageUrl ? `<img src="${m.imageUrl}" class="msg-img">` : ""}<div class="msg-time">${fmtTime(m.createdAt)}</div><button class="msg-del" onclick="delMsg('${cid}','${d.id}')"><i class="fas fa-trash"></i></button>`;
                    mb.appendChild(div);
                });
                mb.scrollTop = mb.scrollHeight;
            });

            $("#btnAdmSend").onclick = async () => {
                const inp = $("#admMsgIn");
                const t = inp.value.trim();
                if (!t) return;
                await setDoc(doc(collection(db, "chats", cid, "messages")), {
                    text: `[Admin] ${t}`, senderId: U.uid, createdAt: serverTimestamp()
                });
                inp.value = "";
            };
            $("#admMsgIn").onkeypress = e => { if (e.key === "Enter") $("#btnAdmSend").click(); };
        };

        window.admUnblock = async (id) => {
            if (!confirm("Unblock this chat?")) return;
            await updateDoc(doc(db, "chats", id), { blocked: false, blockedBy: null, blockedAt: null });
            notify("Chat unblocked", "ok");
            loadTab("blocked");
        };

        /* ============ INIT ============ */
        render();
    </script>
</body>
</html>
