                </div>
                <div class="admin-panel" id="adminPanel">
                    <div class="admin-sidebar">
                        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
                            <h2 style="color:var(--primary);font-size:18px;"><i class="fas fa-shield-alt"></i> Admin</h2>
                            <button class="icon-btn" onclick="closeAdminPanel()"><i class="fas fa-times"></i></button>

                        <div class="admin-nav-item" onclick="switchAdminTab('chats')"><i class="fas fa-comments"></i> All Chats</div>
                        <div class="admin-nav-item" onclick="switchAdminTab('blocked')"><i class="fas fa-ban"></i> Blocked Chats</div>
                        <div class="admin-nav-item" onclick="switchAdminTab('rules')"><i class="fas fa-gavel"></i> Rules</div>

        };
        renderApp();

        window.showLogin = () => { document.getElementById("loginForm").classList.remove("hidden"); document.getElementById("registerForm").classList.add("hidden"); };
        window.showRegister = () => { document.getElementById("loginForm").classList.add("hidden"); document.getElementById("registerForm").classList.remove("hidden"); };

        window.loginWithEmail = async () => {
            try { await signInWithEmailAndPassword(auth, document.getElementById("loginEmail").value, document.getElementById("loginPassword").value); }
            catch (e) { showNotification(e.message, "error"); }
        };

        window.registerWithEmail = async () => {
            try {
                const cred = await createUserWithEmailAndPassword(auth, document.getElementById("regEmail").value, document.getElementById("regPassword").value);
                await setDoc(doc(db, "users", cred.user.uid), { name: document.getElementById("regName").value, email: document.getElementById("regEmail").value, number: null, status: "pending", role: document.getElementById("regEmail").value === ADMIN_EMAIL ? "admin" : "user", theme: "purple", createdAt: serverTimestamp(), lastSeen: serverTimestamp(), online: true, warnings: [], banned: false, photoURL: null, statusText: "", bio: "", socialLinks: {}, visibility: { showImage: true, showLinks: true, showStatus: true }, posts: [] });
            } catch (e) { showNotification(e.message, "error"); }
        };

        window.loginWithGoogle = async () => {
            try {
                const result = await signInWithPopup(auth, googleProvider);
                const userDoc = await getDoc(doc(db, "users", result.user.uid));
                if (!userDoc.exists()) {
                    await setDoc(doc(db, "users", result.user.uid), { name: result.user.displayName || "User", email: result.user.email, number: null, status: "pending", role: result.user.email === ADMIN_EMAIL ? "admin" : "user", theme: "purple", createdAt: serverTimestamp(), lastSeen: serverTimestamp(), online: true, warnings: [], banned: false, photoURL: result.user.photoURL, statusText: "", bio: "", socialLinks: {}, visibility: { showImage: true, showLinks: true, showStatus: true }, posts: [] });
                }
            } catch (e) { showNotification(e.message, "error"); }
        };

        window.handleLogout = async () => {
            if (currentUser) await updateDoc(doc(db, "users", currentUser.uid), { online: false, lastSeen: serverTimestamp() });
            signOut(auth);
        };

        const loadRules = async () => {
            const rulesDoc = await getDoc(doc(db, "settings", "rules"));
            appRules = rulesDoc.exists() ? rulesDoc.data().text : "Welcome to SchoolChat! Please follow these rules:\n1. Be respectful to all users\n2. No spam or harassment\n3. Keep conversations appropriate\n4. Report any issues to admin";
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    currentUserData = userDoc.data();
                    await loadRules();
                    if (currentUserData.banned) { showNotification("Your account has been banned", "error"); signOut(auth); return; }
                    if (currentUserData.status === "approved" || currentUserData.role === "admin") { showMainApp(); loadContacts(); updateOnlineStatus(true); loadStatuses(); }
                    else if (currentUserData.status === "pending") showPendingScreen();
                    else if (currentUserData.status === "denied") showDeniedScreen();
                }
            } else { currentUser = null; currentUserData = null; renderApp(); }
        });

        const showMainApp = () => {
            document.getElementById("authScreen").classList.add("hidden");
            document.getElementById("mainApp").classList.remove("hidden");
            document.getElementById("adminBtn").style.display = currentUserData?.role === "admin" ? "flex" : "none";
            applyTheme(currentUserData?.theme || "purple");
            updateUserProfile();
        };

        const showPendingScreen = () => {
            document.getElementById("authScreen").innerHTML = `<div class="auth-card" style="text-align:center;"><div style="margin-bottom:20px;"><i class="fas fa-clock" style="font-size:64px;color:var(--warning);"></i></div><h2 style="margin-bottom:12px;">Application Pending</h2><p style="color:var(--text-secondary);margin-bottom:24px;">Your application is being reviewed. Please wait for approval.</p><button class="btn btn-secondary" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Sign Out</button></div>`;
        };

        const showDeniedScreen = () => {
            document.getElementById("authScreen").innerHTML = `<div class="auth-card" style="text-align:center;"><div style="margin-bottom:20px;"><i class="fas fa-times-circle" style="font-size:64px;color:var(--danger);"></i></div><h2 style="margin-bottom:12px;">Application Denied</h2><p style="color:var(--text-secondary);margin-bottom:24px;">Your application has been denied.</p><button class="btn btn-secondary" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Sign Out</button></div>`;
        };

        const updateUserProfile = () => {
            const p = document.getElementById("userProfile");
            if (!currentUserData) return;
            const hasPhoto = currentUserData.photoURL && currentUserData.visibility?.showImage !== false;
            const avatar = hasPhoto ? `<img src="${currentUserData.photoURL}" alt="">` : (currentUserData.name?.split(" ").map(n=>n[0]).join("").toUpperCase()||"?");
            const adminBadge = currentUserData.role === "admin" ? '<span class="admin-badge">ADMIN</span>' : '';
            const statusText = currentUserData.statusText ? `<div class="user-status-text">${currentUserData.statusText}</div>` : '';
            p.innerHTML = `<div class="user-avatar">${avatar}</div><div class="user-info"><div class="user-name">${currentUserData.name||"User"} ${adminBadge}</div><div class="user-number">${currentUserData.number?"#"+currentUserData.number:"No number assigned"}</div>${statusText}</div>`;
        };

        const updateOnlineStatus = async (online) => { if (currentUser) await updateDoc(doc(db, "users", currentUser.uid), { online, lastSeen: serverTimestamp() }); };
        window.addEventListener("beforeunload", () => updateOnlineStatus(false));
        document.addEventListener("visibilitychange", () => updateOnlineStatus(!document.hidden));

        const applyTheme = (theme) => { document.body.className = `theme-${theme}`; currentTheme = theme; };

        const loadContacts = () => {
            if (!currentUser) return;
            const cl = document.getElementById("contactsList");
            onSnapshot(query(collection(db, "users"), where("status", "==", "approved")), (snap) => {
                cl.innerHTML = "";
                snap.forEach((d) => {
                    if (d.id === currentUser.uid) return;
                    const u = d.data();
                    const hasPhoto = u.photoURL && u.visibility?.showImage !== false;
                    const avatar = hasPhoto ? `<img src="${u.photoURL}" alt="">` : (u.name?.split(" ").map(n=>n[0]).join("").toUpperCase()||"?");
                    const adminBadge = u.role === "admin" ? '<span class="admin-badge">ADMIN</span>' : '';
                    const statusLine = u.statusText && u.visibility?.showStatus !== false ? `<div class="contact-status"><i class="fas fa-circle" style="font-size:6px;margin-right:4px;"></i>${u.statusText}</div>` : '';
                    cl.innerHTML += `<div class="contact-item" onclick="openChat('${d.id}')"><div class="contact-avatar">${avatar}<div class="status-dot ${u.online?'':'offline'}"></div></div><div class="contact-info"><div class="contact-name">${u.name} ${adminBadge}</div><div class="contact-last-message">#${u.number||"No number"}</div>${statusLine}</div></div>`;
                });
            });
        };

        window.searchContacts = (s) => { document.querySelectorAll(".contact-item").forEach(i => { const n = i.querySelector(".contact-name")?.textContent.toLowerCase()||""; i.style.display = n.includes(s.toLowerCase()) ? "flex" : "none"; }); };

        window.openChat = async (userId) => {
            const ud = await getDoc(doc(db, "users", userId));
            if (!ud.exists()) return;
            const userData = ud.data();
            selectedContact = { id: userId, ...userData };
            const chatId = [currentUser.uid, userId].sort().join("_");
            const cd = await getDoc(doc(db, "chats", chatId));
            if (!cd.exists()) await setDoc(doc(db, "chats", chatId), { participants: [currentUser.uid, userId], createdAt: serverTimestamp(), blocked: false, blockedBy: null });
            const hasPhoto = userData.photoURL && userData.visibility?.showImage !== false;
            const avatar = hasPhoto ? `<img src="${userData.photoURL}" alt="">` : (userData.name?.split(" ").map(n=>n[0]).join("").toUpperCase()||"?");
            const adminBadge = userData.role === "admin" ? '<span class="admin-badge">ADMIN</span>' : '';
            document.getElementById("chatArea").innerHTML = `
                <div class="chat-header">
                    <div class="chat-header-info">
                        <div class="contact-avatar" style="width:42px;height:42px;">${avatar}<div class="status-dot ${userData.online?'':'offline'}"></div></div>
                        <div>
                            <div style="font-weight:600;">${userData.name} ${adminBadge}</div>
                            <div style="font-size:13px;color:var(--text-secondary);">#${userData.number||"No number"} &bull; ${userData.online?'Online':'Last seen: '+formatLastSeen(userData.lastSeen)}</div>
                        </div>
                    </div>
                    <div class="chat-header-actions">
                        <button class="icon-btn" onclick="showUserProfile('${userId}')" title="Profile"><i class="fas fa-info-circle"></i></button>
                        <button class="block-chat-btn" onclick="blockChat('${chatId}')"><i class="fas fa-ban"></i> Block</button>
                    </div>
                </div>
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input">
                    <div class="chat-input-actions">
                        <button onclick="document.getElementById('imageUpload').click()" title="Send Image"><i class="fas fa-image"></i></button>
                        <input type="file" id="imageUpload" accept="image/*" style="display:none" onchange="sendImage('${chatId}', this)">
                    </div>
                    <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter')sendMessage('${chatId}')">
                    <button class="send-btn" onclick="sendMessage('${chatId}')"><i class="fas fa-paper-plane"></i></button>
                </div>
            `;
            loadMessages(chatId);
        };

        const loadMessages = (chatId) => {
            const mc = document.getElementById("chatMessages");
            if (!mc) return;
            onSnapshot(query(collection(db, "chats", chatId, "messages"), orderBy("createdAt")), (snap) => {
                mc.innerHTML = "";
                snap.forEach(async (d) => {
                    const msg = d.data();
                    const isSent = msg.senderId === currentUser.uid;
                    const senderDoc = await getDoc(doc(db, "users", msg.senderId));
                    const senderData = senderDoc.exists() ? senderDoc.data() : {};
                    const isAdminSender = senderData.role === "admin";
                    const senderBadge = isAdminSender ? `<div class="message-sender is-admin"><i class="fas fa-crown"></i> Admin</div>` : '';
                    const deleteBtn = currentUserData.role === "admin" ? `<button class="message-delete-btn" onclick="deleteMessage('${chatId}','${d.id}')" title="Delete"><i class="fas fa-trash"></i></button>` : '';
                    const imageHtml = msg.imageUrl ? `<img src="${msg.imageUrl}" class="message-image" onclick="window.open('${msg.imageUrl}','_blank')">` : '';
                    mc.innerHTML += `<div class="message ${isSent?'sent':'received'}">${senderBadge}<div>${msg.text||''}</div>${imageHtml}<div class="message-time">${formatTime(msg.createdAt)}</div>${deleteBtn}</div>`;
                });
                mc.scrollTop = mc.scrollHeight;
            });
        };

        window.sendMessage = async (chatId) => {
            const input = document.getElementById("messageInput");
            const text = input.value.trim();
            if (!text) return;
            await setDoc(doc(collection(db, "chats", chatId, "messages")), { text, senderId: currentUser.uid, createdAt: serverTimestamp() });
            input.value = "";
        };

        window.sendImage = async (chatId, fileInput) => {
            const file = fileInput.files[0];
            if (!file) return;
            const storageRef = ref(storage, `chat_images/${chatId}/${Date.now()}_${file.name}`);
            await uploadBytes(storageRef, file);
            const url = await getDownloadURL(storageRef);
            await setDoc(doc(collection(db, "chats", chatId, "messages")), { text: "", imageUrl: url, senderId: currentUser.uid, createdAt: serverTimestamp() });
            fileInput.value = "";
        };

        window.deleteMessage = async (chatId, msgId) => {
            if (!confirm("Delete this message?")) return;
            await deleteDoc(doc(db, "chats", chatId, "messages", msgId));
            showNotification("Message deleted", "success");
        };

        window.blockChat = async (chatId) => {
            if (confirm("Block this chat?")) {
                await updateDoc(doc(db, "chats", chatId), { blocked: true, blockedBy: currentUser.uid, blockedAt: serverTimestamp() });
                document.getElementById("chatArea").innerHTML = `<div class="empty-state"><i class="fas fa-ban"></i><h3>Chat Blocked</h3><p>This chat has been blocked</p></div>`;
                showNotification("Chat blocked", "warning");
            }
        };

        const formatTime = (t) => { if (!t) return ""; return t.toDate().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }); };
        const formatLastSeen = (t) => { if (!t) return "Unknown"; const d = t.toDate(); const diff = Date.now()-d; if (diff<60000) return "Just now"; if (diff<3600000) return Math.floor(diff/60000)+"m ago"; if (diff<86400000) return Math.floor(diff/3600000)+"h ago"; return d.toLocaleDateString(); };

        window.showMyProfile = () => {
            const u = currentUserData;
            const hasPhoto = u.photoURL && u.visibility?.showImage !== false;
            document.getElementById("modalContent").innerHTML = `
                <div class="modal-header"><h3>My Profile</h3><button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button></div>
                <div style="text-align:center;margin-bottom:20px;">
                    <div class="profile-image-upload" onclick="document.getElementById('profileImageInput').click()" style="margin:0 auto 12px;">
                        ${hasPhoto ? `<img src="${u.photoURL}">` : '<i class="fas fa-camera"></i>'}
                    </div>
                    <input type="file" id="profileImageInput" accept="image/*" style="display:none" onchange="uploadProfileImage(this)">
                </div>
                <div class="form-group"><label>Display Name</label><input type="text" id="editName" value="${u.name||''}"></div>
                <div class="form-group"><label>Status Text</label><input type="text" id="editStatus" value="${u.statusText||''}" placeholder="What's on your mind?"></div>
                <div class="form-group"><label>Bio</label><textarea id="editBio" placeholder="Tell us about yourself">${u.bio||''}</textarea></div>
                <div class="form-group">
                    <label>Social Links</label>
                    <div class="form-row"><input type="text" id="socialInstagram" placeholder="Instagram URL" value="${u.socialLinks?.instagram||''}"><input type="text" id="socialTwitter" placeholder="Twitter URL" value="${u.socialLinks?.twitter||''}"></div>
                    <div class="form-row" style="margin-top:12px;"><input type="text" id="socialYoutube" placeholder="YouTube URL" value="${u.socialLinks?.youtube||''}"><input type="text" id="socialTiktok" placeholder="TikTok URL" value="${u.socialLinks?.tiktok||''}"></div>
                    <div class="form-row" style="margin-top:12px;"><input type="text" id="socialDiscord" placeholder="Discord" value="${u.socialLinks?.discord||''}"><input type="text" id="socialSnapchat" placeholder="Snapchat" value="${u.socialLinks?.snapchat||''}"></div>
                </div>
                <div class="form-group">
                    <label>Visibility Settings</label>
                    <div class="visibility-toggles">
                        <div class="toggle-row"><span>Show Profile Image</span><div class="toggle-switch ${u.visibility?.showImage!==false?'active':''}" onclick="toggleVisibility('showImage',this)"></div></div>
                        <div class="toggle-row"><span>Show Social Links</span><div class="toggle-switch ${u.visibility?.showLinks!==false?'active':''}" onclick="toggleVisibility('showLinks',this)"></div></div>
                        <div class="toggle-row"><span>Show Status</span><div class="toggle-switch ${u.visibility?.showStatus!==false?'active':''}" onclick="toggleVisibility('showStatus',this)"></div></div>
                    </div>
                </div>
                <div class="form-group"><label>Theme</label>
                    <div class="theme-grid">
                        <div class="theme-option theme-purple ${u.theme==='purple'?'active':''}" onclick="changeTheme('purple')"></div>
                        <div class="theme-option theme-blue ${u.theme==='blue'?'active':''}" onclick="changeTheme('blue')"></div>
                        <div class="theme-option theme-green ${u.theme==='green'?'active':''}" onclick="changeTheme('green')"></div>
                        <div class="theme-option theme-red ${u.theme==='red'?'active':''}" onclick="changeTheme('red')"></div>
                        <div class="theme-option theme-orange ${u.theme==='orange'?'active':''}" onclick="changeTheme('orange')"></div>
                        <div class="theme-option theme-pink ${u.theme==='pink'?'active':''}" onclick="changeTheme('pink')"></div>
                        <div class="theme-option theme-cyan ${u.theme==='cyan'?'active':''}" onclick="changeTheme('cyan')"></div>
                        <div class="theme-option theme-yellow ${u.theme==='yellow'?'active':''}" onclick="changeTheme('yellow')"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Change Password</label>
                    <div class="password-change-section">
                        <div class="form-group"><label>Current Password</label><input type="password" id="currentPassword" placeholder="Enter current password"></div>
                        <div class="form-group"><label>New Password</label><input type="password" id="newPassword" placeholder="Enter new password"></div>
                        <button class="btn btn-warning btn-sm" onclick="changeOwnPassword()" style="width:100%"><i class="fas fa-key"></i> Update Password</button>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="saveProfile()"><i class="fas fa-save"></i> Save Changes</button>
            `;
            document.getElementById("modalOverlay").classList.add("active");
        };

        window.uploadProfileImage = async (input) => {
            const file = input.files[0];
            if (!file) return;
            const storageRef = ref(storage, `profile_images/${currentUser.uid}`);
            await uploadBytes(storageRef, file);
            const url = await getDownloadURL(storageRef);
            await updateDoc(doc(db, "users", currentUser.uid), { photoURL: url });
            currentUserData.photoURL = url;
            updateUserProfile();
            showNotification("Profile image updated", "success");
        };

        window.toggleVisibility = async (key, el) => {
            el.classList.toggle("active");
            const vis = currentUserData.visibility || {};
            vis[key] = el.classList.contains("active");
            currentUserData.visibility = vis;
        };

        window.changeOwnPassword = async () => {
            const current = document.getElementById("currentPassword").value;
            const newPass = document.getElementById("newPassword").value;
            if (!current || !newPass) { showNotification("Fill all fields", "error"); return; }
            if (newPass.length < 6) { showNotification("Password must be at least 6 characters", "error"); return; }
            try {
                const credential = EmailAuthProvider.credential(currentUser.email, current);
                await reauthenticateWithCredential(auth, credential);
                await updatePassword(auth, newPass);
                showNotification("Password updated", "success");
                document.getElementById("currentPassword").value = "";
                document.getElementById("newPassword").value = "";
            } catch (e) { showNotification("Current password is incorrect", "error"); }
        };

        window.saveProfile = async () => {
            const data = {
                name: document.getElementById("editName").value,
                statusText: document.getElementById("editStatus").value,
                bio: document.getElementById("editBio").value,
                socialLinks: {
                    instagram: document.getElementById("socialInstagram").value,
                    twitter: document.getElementById("socialTwitter").value,
                    youtube: document.getElementById("socialYoutube").value,
                    tiktok: document.getElementById("socialTiktok").value,
                    discord: document.getElementById("socialDiscord").value,
                    snapchat: document.getElementById("socialSnapchat").value
                },
                visibility: currentUserData.visibility
            };
            await updateDoc(doc(db, "users", currentUser.uid), data);
            currentUserData = { ...currentUserData, ...data };
            updateUserProfile();
            closeModal();
            showNotification("Profile updated", "success");
        };

        window.changeTheme = async (theme) => {
            applyTheme(theme);
            if (currentUser) await updateDoc(doc(db, "users", currentUser.uid), { theme });
            currentUserData.theme = theme;
            document.querySelectorAll(".theme-option").forEach(el => el.classList.remove("active"));
            document.querySelector(`.theme-${theme}`)?.classList.add("active");
        };

        window.showUserProfile = async (userId) => {
            const ud = await getDoc(doc(db, "users", userId));
            if (!ud.exists()) return;
            const u = ud.data();
            const hasPhoto = u.photoURL && u.visibility?.showImage !== false;
            const socialLinks = u.socialLinks || {};
            const hasLinks = u.visibility?.showLinks !== false && Object.values(socialLinks).some(v => v);
            let linksHtml = '';
            if (hasLinks) {
                linksHtml = '<div class="social-links">';
                if (socialLinks.instagram) linksHtml += `<a href="${socialLinks.instagram}" target="_blank" class="social-link"><i class="fab fa-instagram"></i> Instagram</a>`;
                if (socialLinks.twitter) linksHtml += `<a href="${socialLinks.twitter}" target="_blank" class="social-link"><i class="fab fa-twitter"></i> Twitter</a>`;
                if (socialLinks.youtube) linksHtml += `<a href="${socialLinks.youtube}" target="_blank" class="social-link"><i class="fab fa-youtube"></i> YouTube</a>`;
                if (socialLinks.tiktok) linksHtml += `<a href="${socialLinks.tiktok}" target="_blank" class="social-link"><i class="fab fa-tiktok"></i> TikTok</a>`;
                if (socialLinks.discord) linksHtml += `<a href="${socialLinks.discord}" target="_blank" class="social-link"><i class="fab fa-discord"></i> Discord</a>`;
                if (socialLinks.snapchat) linksHtml += `<a href="${socialLinks.snapchat}" target="_blank" class="social-link"><i class="fab fa-snapchat"></i> Snapchat</a>`;
                linksHtml += '</div>';
            }
            document.getElementById("modalContent").innerHTML = `
                <div class="modal-header"><h3>User Profile</h3><button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button></div>

                    <div class="user-detail-avatar">${hasPhoto ? `<img src="${u.photoURL}">` : (u.name?.[0]?.toUpperCase()||'?')}</div>
                    <div class="user-detail-info">
                        <h3>${u.name} ${u.role==='admin'?'<span class="admin-badge">ADMIN</span>':''}</h3>
                        <p>${u.email}</p>
                        ${u.statusText && u.visibility?.showStatus!==false ? `<p style="color:var(--primary);margin-top:4px;"><i class="fas fa-circle" style="font-size:8px;"></i> ${u.statusText}</p>` : ''}
                    </div>
                </div>
                ${u.bio ? `<div style="margin-bottom:16px;"><label style="color:var(--text-secondary);font-size:13px;">Bio</label><p>${u.bio}</p></div>` : ''}
                <div class="user-detail-stats">
                    <div class="detail-stat"><label>Number</label><span>#${u.number||'N/A'}</span></div>
                    <div class="detail-stat"><label>Status</label><span class="status-badge ${u.online?'status-online':'status-offline'}">${u.online?'Online':'Offline'}</span></div>
                    <div class="detail-stat"><label>Warnings</label><span>${u.warnings?.length||0}</span></div>
                    <div class="detail-stat"><label>Last Seen</label><span>${u.lastSeen?formatLastSeen(u.lastSeen):'N/A'}</span></div>
                </div>
                ${linksHtml}
            `;
            document.getElementById("modalOverlay").classList.add("active");
        };

        window.showAddContactModal = () => {
            document.getElementById("modalContent").innerHTML = `<div class="modal-header"><h3>Add Contact</h3><button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button></div><div class="form-group"><label>Enter user number</label><input type="number" id="contactNumber" placeholder="Enter number"></div><button class="btn btn-primary" onclick="searchByNumber()"><i class="fas fa-search"></i> Search</button><div id="searchResults" style="margin-top:16px;"></div>`;
            document.getElementById("modalOverlay").classList.add("active");
        };

        window.searchByNumber = async () => {
            const number = parseInt(document.getElementById("contactNumber").value);
            if (!number) return;
            const q = query(collection(db, "users"), where("number", "==", number));
            const snap = await getDocs(q);
            const r = document.getElementById("searchResults");
            if (snap.empty) { r.innerHTML = "<p style='color:var(--text-secondary);'>No user found</p>"; return; }
            snap.forEach((d) => {
                const u = d.data();
                if (d.id !== currentUser.uid) r.innerHTML += `<div class="contact-request-item"><h4>${u.name}</h4><p>#${u.number}</p><button class="btn btn-primary btn-sm" onclick="openChat('${d.id}');closeModal();"><i class="fas fa-comment"></i> Chat</button></div>`;
            });
        };

        window.closeModal = () => { document.getElementById("modalOverlay").classList.remove("active"); };

        const showNotification = (msg, type) => {
            const n = document.createElement("div");
            n.className = `notification ${type}`;
            n.innerHTML = `<i class="fas fa-${type==='success'?'check-circle':type==='error'?'exclamation-circle':'exclamation-triangle'}"></i><span>${msg}</span>`;
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 3000);
        };

        const loadStatuses = () => {
            const sv = document.getElementById("statusViewer");
            if (!sv) return;
            onSnapshot(query(collection(db, "users"), where("status", "==", "approved")), (snap) => {
                sv.innerHTML = '';
                let myStatusHtml = `<div class="status-item" onclick="showAddStatusModal()"><div class="status-avatar ${currentUserData?.statusImage?'':'no-status'}">${currentUserData?.statusImage ? `<img src="${currentUserData.statusImage}">` : '<i class="fas fa-plus" style="font-size:20px;"></i>'}</div><div class="status-name">My Status</div></div>`;
                sv.innerHTML = myStatusHtml;
                snap.forEach((d) => {
                    if (d.id === currentUser.uid) return;
                    const u = d.data();
                    if (!u.statusImage) return;
                    sv.innerHTML += `<div class="status-item" onclick="viewStatus('${d.id}')"><div class="status-avatar"><img src="${u.statusImage}"></div><div class="status-name">${u.name?.split(' ')[0]}</div></div>`;
                });
            });
        };

        window.showAddStatusModal = () => {
            document.getElementById("modalContent").innerHTML = `<div class="modal-header"><h3>My Status</h3><button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button></div>${currentUserData?.statusImage ? `<div style="text-align:center;margin-bottom:16px;"><img src="${currentUserData.statusImage}" style="max-width:100%;border-radius:12px;"><br><button class="btn btn-danger btn-sm" style="margin-top:12px;" onclick="deleteStatus()"><i class="fas fa-trash"></i> Delete Status</button></div>` : ''}<div class="form-group"><label>Upload Status Image</label><input type="file" id="statusImageInput" accept="image/*"></div><button class="btn btn-primary" onclick="uploadStatus()"><i class="fas fa-upload"></i> Upload</button>`;
            document.getElementById("modalOverlay").classList.add("active");
        };

        window.uploadStatus = async () => {
            const file = document.getElementById("statusImageInput").files[0];
            if (!file) { showNotification("Select an image", "error"); return; }
            const storageRef = ref(storage, `statuses/${currentUser.uid}`);
            await uploadBytes(storageRef, file);
            const url = await getDownloadURL(storageRef);
            await updateDoc(doc(db, "users", currentUser.uid), { statusImage: url, statusTimestamp: serverTimestamp() });
            currentUserData.statusImage = url;
            closeModal();
            showNotification("Status updated", "success");
            loadStatuses();
        };

        window.deleteStatus = async () => {
            await updateDoc(doc(db, "users", currentUser.uid), { statusImage: null, statusTimestamp: null });
            currentUserData.statusImage = null;
            closeModal();
            showNotification("Status deleted", "success");
            loadStatuses();
        };

        window.viewStatus = async (userId) => {
            const ud = await getDoc(doc(db, "users", userId));
            if (!ud.exists()) return;
            const u = ud.data();
            document.getElementById("modalContent").innerHTML = `<div class="status-modal-content"><div class="modal-header"><h3>${u.name}'s Status</h3><button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button></div><img src="${u.statusImage}"><p style="color:var(--text-secondary);margin-top:8px;">${u.statusTimestamp ? 'Posted '+formatLastSeen(u.statusTimestamp) : ''}</p></div>`;
            document.getElementById("modalOverlay").classList.add("active");
        };

        // ADMIN PANEL
        window.openAdminPanel = async () => { if (currentUserData?.role !== "admin") return; document.getElementById("adminPanel").classList.add("active"); switchAdminTab("applications"); };
        window.closeAdminPanel = () => { document.getElementById("adminPanel").classList.remove("active"); };

        window.switchAdminTab = (tab) => {
            adminTab = tab;
            document.querySelectorAll(".admin-nav-item").forEach(el => el.classList.remove("active"));
            event?.target?.closest?.(".admin-nav-item")?.classList.add("active");
            loadAdminTab(tab);
        };

        const loadAdminTab = async (tab) => {
            const c = document.getElementById("adminContent");
            switch(tab) {
                case "applications": await loadApplications(c); break;
                case "users": await loadUsers(c); break;
                case "chats": await loadAllChats(c); break;
                case "blocked": await loadBlockedChats(c); break;
                case "rules": loadRulesAdmin(c); break;
                case "settings": loadAdminSettings(c); break;
            }
        };

        const loadApplications = async (c) => {
            const snap = await getDocs(query(collection(db, "users"), where("status", "==", "pending")));
            let html = '<div class="admin-header"><h2>Pending Applications</h2></div>';
            if (snap.empty) { html += '<p style="color:var(--text-secondary);">No pending applications</p>'; }
            else {
                html += '<table class="admin-table"><thead><tr><th>User</th><th>Email</th><th>Application</th><th>Actions</th></tr></thead><tbody>';
                snap.forEach((d) => {
                    const u = d.data(), app = u.application||{};
                    html += `<tr><td>${u.name}</td><td>${u.email}</td><td><strong>Phone:</strong> ${app.phone||'N/A'}<br><strong>Grade:</strong> ${app.grade||'N/A'}<br><strong>Reason:</strong> ${app.reason||'N/A'}</td><td><div class="action-btns"><button class="action-btn approve" onclick="approveUser('${d.id}')"><i class="fas fa-check"></i></button><button class="action-btn deny" onclick="denyUser('${d.id}')"><i class="fas fa-times"></i></button></div></td></tr>`;
                });
                html += '</tbody></table>';
            }
            c.innerHTML = html;
        };

        const loadUsers = async (c) => {
            const snap = await getDocs(query(collection(db, "users"), where("status", "==", "approved")));
            let html = '<div class="admin-header"><h2>All Users</h2></div><table class="admin-table"><thead><tr><th>User</th><th>Number</th><th>Status</th><th>Warnings</th><th>Last Seen</th><th>Actions</th></tr></thead><tbody>';
            snap.forEach((d) => {
                const u = d.data();
                html += `<tr><td>${u.name} ${u.banned?'<span class="status-badge status-banned">BANNED</span>':''}</td><td>#${u.number||'N/A'}</td><td><span class="status-badge ${u.online?'status-online':'status-offline'}">${u.online?'Online':'Offline'}</span></td><td>${u.warnings?.length||0}</td><td>${u.lastSeen?formatLastSeen(u.lastSeen):'N/A'}</td><td><div class="action-btns"><button class="action-btn view" onclick="viewUser('${d.id}')" title="View"><i class="fas fa-eye"></i></button><button class="action-btn edit" onclick="adminChangePassword('${d.id}','${u.email}')" title="Change Password"><i class="fas fa-key"></i></button><button class="action-btn warn" onclick="warnUser('${d.id}')" title="Warn"><i class="fas fa-exclamation-triangle"></i></button><button class="action-btn ban" onclick="banUser('${d.id}')" title="Ban"><i class="fas fa-ban"></i></button></div></td></tr>`;
            });
            html += '</tbody></table>';
            c.innerHTML = html;
        };

        const loadAllChats = async (c) => {
            const snap = await getDocs(collection(db, "chats"));
            let html = '<div class="admin-header"><h2>All Chats</h2></div>';
            if (snap.empty) { html += '<p style="color:var(--text-secondary);">No chats yet</p>'; }
            else {
                html += '<table class="admin-table"><thead><tr><th>Participants</th><th>Messages</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
                for (const d of snap.docs) {
                    const chat = d.data();
                    const ms = await getDocs(collection(db, "chats", d.id, "messages"));
                    const names = [];
                    for (const p of chat.participants||[]) { const ud = await getDoc(doc(db, "users", p)); if (ud.exists()) names.push(ud.data().name); }
                    html += `<tr><td>${names.join(' & ')}</td><td>${ms.size}</td><td>${chat.blocked?'<span class="status-badge status-banned">Blocked</span>':'Active'}</td><td><div class="action-btns"><button class="action-btn view" onclick="viewChatAdmin('${d.id}')" title="View"><i class="fas fa-eye"></i></button></div></td></tr>`;
                }
                html += '</tbody></table>';
            }
            c.innerHTML = html;
        };

        const loadBlockedChats = async (c) => {
            const snap = await getDocs(query(collection(db, "chats"), where("blocked", "==", true)));
            let html = '<div class="admin-header"><h2>Blocked Chats</h2></div>';
            if (snap.empty) { html += '<p style="color:var(--text-secondary);">No blocked chats</p>'; }
            else {
                html += '<table class="admin-table"><thead><tr><th>Chat</th><th>Blocked By</th><th>Actions</th></tr></thead><tbody>';
                for (const d of snap.docs) {
                    const chat = d.data();
                    const bd = await getDoc(doc(db, "users", chat.blockedBy));
                    const names = [];
                    for (const p of chat.participants||[]) { const ud = await getDoc(doc(db, "users", p)); if (ud.exists()) names.push(ud.data().name); }
                    html += `<tr><td>${names.join(' & ')}</td><td>${bd.exists()?bd.data().name:'Unknown'}</td><td><div class="action-btns"><button class="action-btn view" onclick="viewChatAdmin('${d.id}')" title="View"><i class="fas fa-eye"></i></button><button class="action-btn approve" onclick="unblockChat('${d.id}')" title="Unblock"><i class="fas fa-unlock"></i></button></div></td></tr>`;
                }
                html += '</tbody></table>';
            }
            c.innerHTML = html;
        };

        const loadRulesAdmin = (c) => {
            c.innerHTML = `<div class="admin-header"><h2>App Rules</h2></div><div class="form-group"><label>Edit Rules (visible to all users)</label><textarea class="rules-editor" id="rulesEditor">${appRules}</textarea></div><button class="btn btn-primary" onclick="saveRules()"><i class="fas fa-save"></i> Save Rules</button><div class="rules-display" style="margin-top:24px;"><h4 style="margin-bottom:8px;">Current Rules (User View):</h4><p id="rulesPreview">${appRules}</p></div>`;
        };

        window.saveRules = async () => {
            const text = document.getElementById("rulesEditor").value;
            await setDoc(doc(db, "settings", "rules"), { text });
            appRules = text;
            document.getElementById("rulesPreview").textContent = text;
            showNotification("Rules updated", "success");
        };

        const loadAdminSettings = async (c) => {
            const themes = ["purple","blue","green","red","orange","pink","cyan","yellow"];
            c.innerHTML = `<div class="admin-header"><h2>Admin Settings</h2></div>
                <div class="application-form"><h3>System Info</h3><p style="color:var(--text-secondary);">Admin: ${ADMIN_EMAIL}<br>Logged in: ${currentUserData?.email}</p></div>
                <div class="application-form"><h3>Change Your Password</h3>
                    <div class="form-group"><label>Current Password</label><input type="password" id="adminCurrentPass"></div>
                    <div class="form-group"><label>New Password</label><input type="password" id="adminNewPass"></div>
                    <button class="btn btn-warning" onclick="adminChangeOwnPassword()"><i class="fas fa-key"></i> Update Password</button>
                </div>
                <div class="application-form"><h3>Default Theme (All Users)</h3>
                    <div class="theme-grid">${themes.map(t => `<div class="theme-option theme-${t}" onclick="setDefaultTheme('${t}')"></div>`).join('')}</div>
                    <p style="color:var(--text-secondary);margin-top:12px;font-size:13px;">Sets the default theme for new and existing users</p>
                </div>`;
        };

        window.adminChangeOwnPassword = async () => {
            const current = document.getElementById("adminCurrentPass").value;
            const newPass = document.getElementById("adminNewPass").value;
            if (!current || !newPass) { showNotification("Fill all fields", "error"); return; }
            if (newPass.length < 6) { showNotification("Password must be at least 6 characters", "error"); return; }
            try {
                const credential = EmailAuthProvider.credential(currentUser.email, current);
                await reauthenticateWithCredential(auth, credential);
                await updatePassword(auth, newPass);
                showNotification("Password updated", "success");
                document.getElementById("adminCurrentPass").value = "";
                document.getElementById("adminNewPass").value = "";
            } catch (e) { showNotification("Current password is incorrect", "error"); }
        };

        window.setDefaultTheme = async (theme) => {
            if (!confirm(`Set "${theme}" as default theme for all users?`)) return;
            const snap = await getDocs(query(collection(db, "users"), where("status", "==", "approved")));
            const batch = [];
            snap.forEach((d) => { batch.push(updateDoc(doc(db, "users", d.id), { theme })); });
            await Promise.all(batch);
            applyTheme(theme);
            showNotification(`Default theme set to ${theme}`, "success");
        };

        window.approveUser = async (userId) => {
            const number = Math.floor(1000 + Math.random() * 9000);
            await updateDoc(doc(db, "users", userId), { status: "approved", number });
            showNotification(`User approved with #${number}`, "success");
            loadAdminTab("applications");
        };

        window.denyUser = async (userId) => { await updateDoc(doc(db, "users", userId), { status: "denied" }); showNotification("User denied", "error"); loadAdminTab("applications"); };

        window.viewUser = async (userId) => {
            const ud = await getDoc(doc(db, "users", userId));
            if (!ud.exists()) return;
            const u = ud.data();
            document.getElementById("modalContent").innerHTML = `<div class="modal-header"><h3>User Details</h3><button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button></div>
                <div class="user-detail-header"><div class="user-detail-avatar">${u.photoURL?`<img src="${u.photoURL}">`:(u.name?.[0]?.toUpperCase()||'?')}</div><div class="user-detail-info"><h3>${u.name} ${u.role==='admin'?'<span class="admin-badge">ADMIN</span>':''}</h3><p>${u.email}</p></div></div>
                <div class="user-detail-stats"><div class="detail-stat"><label>Number</label><span>#${u.number||'N/A'}</span></div><div class="detail-stat"><label>Status</label><span class="status-badge ${u.online?'status-online':'status-offline'}">${u.online?'Online':'Offline'}</span></div><div class="detail-stat"><label>Warnings</label><span>${u.warnings?.length||0}</span></div><div class="detail-stat"><label>Last Seen</label><span>${u.lastSeen?formatLastSeen(u.lastSeen):'N/A'}</span></div></div>
                ${u.warnings?.length?`<div style="margin-bottom:16px;"><h4>Warnings:</h4>${u.warnings.map(w=>`<div class="warning-badge"><i class="fas fa-exclamation-triangle"></i> ${w}</div>`).join(' ')}</div>`:''}
                <div class="action-btns" style="justify-content:flex-end;"><button class="btn btn-warning btn-sm" onclick="warnUser('${userId}');closeModal();"><i class="fas fa-exclamation-triangle"></i> Warn</button><button class="btn btn-danger btn-sm" onclick="banUser('${userId}');closeModal();"><i class="fas fa-ban"></i> Ban</button></div>`;
            document.getElementById("modalOverlay").classList.add("active");
        };

        window.adminChangePassword = (userId, email) => {
            document.getElementById("modalContent").innerHTML = `<div class="modal-header"><h3>Change Password</h3><button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button></div><p style="color:var(--text-secondary);margin-bottom:16px;">Change password for ${email}</p><div class="form-group"><label>New Password</label><input type="password" id="adminUserNewPass" placeholder="Enter new password"></div><button class="btn btn-primary" onclick="adminSetUserPassword('${userId}')"><i class="fas fa-key"></i> Set New Password</button>`;
            document.getElementById("modalOverlay").classList.add("active");
        };

        window.adminSetUserPassword = async (userId) => {
            const newPass = document.getElementById("adminUserNewPass").value;
            if (!newPass || newPass.length < 6) { showNotification("Password must be at least 6 characters", "error"); return; }
            await updateDoc(doc(db, "users", userId), { tempPassword: newPass });
            showNotification("Password will be updated on user's next login (Firebase requires client-side password change)", "success");
            closeModal();
        };

        window.warnUser = async (userId) => {
            const reason = prompt("Enter warning reason:");
            if (!reason) return;
            const ud = await getDoc(doc(db, "users", userId));
            const warnings = ud.data().warnings||[];
            warnings.push(reason);
            await updateDoc(doc(db, "users", userId), { warnings });
            showNotification("User warned", "warning");
            loadAdminTab("users");
        };

        window.banUser = async (userId) => {
            if (!confirm("Ban this user?")) return;
            await updateDoc(doc(db, "users", userId), { banned: true });
            showNotification("User banned", "error");
            loadAdminTab("users");
        };

        window.viewChatAdmin = (chatId) => {
            document.getElementById("modalContent").innerHTML = `<div class="modal-header"><h3>Chat View</h3><button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button></div><div style="display:flex;flex-direction:column;height:500px;"><div id="adminChatMessages" style="flex:1;overflow-y:auto;padding:16px;background:var(--bg);border-radius:12px;margin-bottom:12px;"></div><div style="display:flex;gap:8px;"><input type="text" id="adminMessageInput" placeholder="Message as admin..." style="flex:1;padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--bg-secondary);color:var(--text);" onkeypress="if(event.key==='Enter')sendAdminChatMessage('${chatId}')"><button class="send-btn" onclick="sendAdminChatMessage('${chatId}')"><i class="fas fa-paper-plane"></i></button></div></div>`;
            document.getElementById("modalOverlay").classList.add("active");
            onSnapshot(query(collection(db, "chats", chatId, "messages"), orderBy("createdAt")), (snap) => {
                const mc = document.getElementById("adminChatMessages");
                if (!mc) return;
                mc.innerHTML = "";
                snap.forEach((d) => {
                    const msg = d.data();
                    const isSent = msg.senderId === currentUser.uid;
                    mc.innerHTML += `<div class="message ${isSent?'sent':'received'}"><div>${msg.text||''}</div>${msg.imageUrl?`<img src="${msg.imageUrl}" class="message-image">`:''}<div class="message-time">${formatTime(msg.createdAt)}</div><button class="message-delete-btn" onclick="deleteMessage('${chatId}','${d.id}')" title="Delete"><i class="fas fa-trash"></i></button></div>`;
                });
                mc.scrollTop = mc.scrollHeight;
            });
        };

        window.sendAdminChatMessage = async (chatId) => {
            const input = document.getElementById("adminMessageInput");
            const text = input.value.trim();
            if (!text) return;
            await setDoc(doc(collection(db, "chats", chatId, "messages")), { text: `[Admin] ${text}`, senderId: currentUser.uid, createdAt: serverTimestamp() });
            input.value = "";
        };

        window.unblockChat = async (chatId) => {
            await updateDoc(doc(db, "chats", chatId), { blocked: false, blockedBy: null, blockedAt: null });
            showNotification("Chat unblocked", "success");
            loadAdminTab("blocked");
        };

        document.getElementById("modalOverlay").addEventListener("click", (e) => { if (e.target.id === "modalOverlay") closeModal(); });
    </script>
</body>
</html>
